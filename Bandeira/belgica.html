<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeira</title>
</head>
<body>
    <h1>Bandeira Belgica - Felipe Bonini</h1>
    <canvas id="meu_canvas" width="3000" height="3000"></canvas>

    <script>
        var canvas=document.getElementById('meu_canvas');
        var context=canvas.getContext('2d');

        context.fillStyle = 'black';
        context.fillRect(100, 100, 200, 500);
        context.fillStyle = 'yellow';
        context.fillRect(300, 100, 200, 500);
        context.fillStyle = 'red';
        context.fillRect(500, 100, 200, 500);
    </script>
    
</body>
</html>
